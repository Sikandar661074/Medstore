name: medstore_app
description: "MedStore Manager - Medical Store Management App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Notifications & Background Tasks
  flutter_local_notifications: ^17.2.3
  workmanager: ^0.5.2

  # Utilities
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  file_picker: ^8.1.4
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
